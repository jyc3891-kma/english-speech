<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KMA 영미문화연구 · 학습 앱</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--bg2:#f7f6f3;--bg3:#f0efe9;
  --text:#1a1916;--text2:#6b6a66;--text3:#9e9d99;
  --border:#e4e3de;--border2:#d0cfc9;
  --green:#1D9E75;--green-l:#E1F5EE;--green-d:#085041;--green-m:#0F6E56;
  --purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#3C3489;
  --amber:#C07009;--amber-l:#FAEEDA;--amber-d:#633806;
  --teal:#9FE1CB;--red:#A32D2D;--red-l:#FCEBEB;
  --r:10px;--rs:6px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR','Apple SD Gothic Neo',sans-serif;
  background:var(--bg2);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;}
button{cursor:pointer;font-family:inherit;}
input,textarea,select{font-family:inherit;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ── Screens ── */
.screen{display:none;}
.screen.on{display:flex;flex-direction:column;min-height:100vh;}

/* ── Start ── */
#sc-start{align-items:center;justify-content:center;background:var(--bg);}
.start-inner{width:100%;max-width:360px;padding:2.5rem 1.5rem;display:flex;flex-direction:column;align-items:center;}
.kma-label{font-size:11px;font-weight:700;letter-spacing:.18em;color:var(--text3);margin-bottom:6px;}
.start-title{font-size:22px;font-weight:700;margin-bottom:4px;text-align:center;}
.start-sub{font-size:12px;color:var(--text3);margin-bottom:2rem;text-align:center;font-style:italic;}
.start-input{width:100%;padding:11px 14px;font-size:15px;border:1px solid var(--border2);border-radius:var(--r);
  background:var(--bg2);color:var(--text);text-align:center;margin-bottom:10px;outline:none;}
.start-input:focus{border-color:var(--green);}
.start-btn{width:100%;padding:11px;font-size:14px;font-weight:700;border:none;border-radius:var(--r);
  background:var(--text);color:#fff;}
.start-btn:hover{opacity:.85;}
.start-note{font-size:11px;color:var(--text3);margin-top:14px;text-align:center;}
.start-prof{margin-top:6px;font-size:12px;color:var(--text3);background:none;border:none;text-decoration:underline;}

/* ── App shell ── */
#sc-app{background:var(--bg2);}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0;gap:12px;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-kma{font-size:10px;font-weight:700;letter-spacing:.18em;color:var(--text3);}
.topbar-title{font-size:14px;font-weight:700;}
.topbar-sep{color:var(--border2);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.cpill{font-size:12px;color:var(--text2);background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;}
.ppill{font-size:12px;font-weight:700;color:var(--green-m);background:var(--green-l);border-radius:20px;padding:3px 10px;}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg);
  color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:16px;}
.icon-btn:hover{background:var(--bg2);}

/* ── Work tabs ── */
.wtabs{background:var(--bg);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 16px;flex-shrink:0;}
.wtab{padding:10px 14px;font-size:13px;color:var(--text2);background:none;border:none;
  border-bottom:2px solid transparent;white-space:nowrap;}
.wtab.active{color:var(--text);border-bottom-color:var(--text);font-weight:700;}

/* ── Stepper ── */
.stepper{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;flex-shrink:0;}
.si{display:flex;align-items:center;gap:7px;cursor:pointer;padding:4px 6px;border-radius:var(--rs);}
.si:hover{background:var(--bg2);}
.sdot{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;color:var(--text3);flex-shrink:0;}
.si.active .sdot{background:var(--text);color:#fff;border-color:var(--text);}
.si.done .sdot{background:var(--green);color:#fff;border-color:var(--green);font-size:13px;}
.slbl{font-size:12px;color:var(--text2);white-space:nowrap;}
.si.active .slbl{color:var(--text);font-weight:700;}
.si.done .slbl{color:var(--green-m);}
.sline{flex:1;height:1px;background:var(--border);margin:0 4px;}

/* ── Content ── */
.content{flex:1;overflow-y:auto;padding:16px;max-width:760px;width:100%;margin:0 auto;}

/* ── Cards ── */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);}
.inset{background:var(--bg2);border-radius:var(--rs);padding:10px 13px;margin:8px 0;}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
.b-green{background:var(--green-l);color:var(--green-d);}
.b-purple{background:var(--purple-l);color:var(--purple-d);}
.b-amber{background:var(--amber-l);color:var(--amber-d);}
.b-gray{background:var(--bg2);color:var(--text2);border:1px solid var(--border);}

/* ── Buttons ── */
.btn{padding:7px 14px;font-size:13px;font-weight:500;border:1px solid var(--border2);
  border-radius:var(--rs);background:var(--bg);color:var(--text);}
.btn:hover{background:var(--bg2);}
.btn-p{background:var(--text);color:#fff;border-color:var(--text);}
.btn-p:hover{opacity:.85;}
.btn-g{background:var(--green);color:#fff;border-color:var(--green);}
.btn-g:hover{opacity:.85;}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-danger{color:var(--red);border-color:#E24B4A;background:var(--bg);}
.btn-danger:hover{background:var(--red-l);}
.btn-ghost{border-color:transparent;color:var(--text2);background:none;}
.btn-ghost:hover{background:var(--bg2);color:var(--text);}

/* ── Progress bar ── */
.pbar{height:3px;background:var(--bg3);border-radius:2px;margin:6px 0 4px;}
.pbar-f{height:3px;border-radius:2px;background:var(--green);transition:width .4s;}

/* ── Step nav ── */
.step-nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border);}

/* ── Vocab grid ── */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin:10px 0;}
.vc{border:1px solid var(--border);border-radius:var(--rs);padding:12px 10px;cursor:pointer;
  text-align:center;background:var(--bg);user-select:none;}
.vc:hover{background:var(--bg2);border-color:var(--border2);}
.vc.rev{border-color:var(--teal);background:var(--green-l);}
.vc-word{font-size:13px;font-weight:700;margin-bottom:2px;}
.vc-pos{font-size:10px;color:var(--text3);margin-bottom:2px;}
.vc-hint{font-size:11px;color:var(--text3);}
.vc-def{font-size:12px;color:var(--green-d);margin-top:6px;display:none;text-align:left;line-height:1.5;}
.vc.rev .vc-def{display:block;}
.vc.rev .vc-hint{display:none;}
.vc.rev .vc-word{color:var(--green-d);}

/* ── Passages ── */
.p-en{font-size:14px;line-height:1.95;color:var(--text);margin-bottom:12px;font-style:italic;
  border-left:3px solid var(--border2);padding-left:14px;}
.p-ko{font-size:13px;line-height:1.9;color:var(--text2);border-left:3px solid var(--teal);padding-left:13px;margin-bottom:10px;}
.p-note{font-size:12px;background:var(--amber-l);color:var(--amber-d);border-radius:var(--rs);padding:10px 13px;line-height:1.75;}
.p-note-lbl{font-size:10px;letter-spacing:.06em;font-weight:700;text-transform:uppercase;margin-bottom:5px;color:var(--amber);}

/* ── Q blocks ── */
.qblock{border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;background:var(--bg);box-shadow:var(--shadow);}
.q-basic{border-left:3px solid var(--green);}
.q-deep{border-left:3px solid var(--purple);}
.q-theme{border-left:3px solid var(--amber);}
.q-text{font-size:14px;line-height:1.75;margin:8px 0 10px;}
textarea{width:100%;border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-size:13px;
  color:var(--text);background:var(--bg2);resize:vertical;min-height:90px;outline:none;line-height:1.6;}
textarea:focus{border-color:var(--green);background:var(--bg);}

/* ── Feedback ── */
.fb{margin-top:10px;padding:12px 14px;background:var(--green-l);border-left:3px solid var(--green);
  display:none;border-radius:0 var(--rs) var(--rs) 0;}
.fb.on{display:block;}
.fb-lbl{font-size:10px;color:var(--green-m);font-weight:700;margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase;}
.fb-text{font-size:13px;line-height:1.8;color:var(--text);}

/* ── Spinner ── */
.spin{display:none;font-size:12px;color:var(--text3);padding:6px 0;}
.spin.on{display:block;}

/* ── Util ── */
.flex{display:flex;}.ai{align-items:center;}.jb{justify-content:space-between;}
.gap6{gap:6px;}.gap8{gap:8px;}
.mt4{margin-top:4px;}.mt8{margin-top:8px;}.mt12{margin-top:12px;}
.mb8{margin-bottom:8px;}.mb12{margin-bottom:12px;}
.hint{font-size:12px;color:var(--text3);}
.muted{color:var(--text2);}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);}
.empty i{font-size:28px;display:block;margin-bottom:10px;opacity:.4;}

/* ── Overlays (공통) ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:none;align-items:flex-start;justify-content:center;
  padding:2rem 1rem;overflow-y:auto;}
.overlay.on{display:flex;}
.modal-box{background:var(--bg);border-radius:var(--r);border:1px solid var(--border);
  padding:1.5rem;width:min(580px,100%);box-shadow:0 8px 28px rgba(0,0,0,.18);}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;}
.mttl{font-size:16px;font-weight:700;}

/* ── Prof tabs ── */
.ptabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1rem;overflow-x:auto;}
.ptab{padding:8px 14px;font-size:12px;font-weight:500;background:none;border:none;
  color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.ptab.active{color:var(--text);border-bottom-color:var(--text);}

/* ── Form inputs ── */
.flab{font-size:12px;color:var(--text2);display:block;margin-bottom:3px;margin-top:10px;}
.finp{width:100%;border:1px solid var(--border);border-radius:var(--rs);
  padding:8px 11px;font-size:13px;color:var(--text);background:var(--bg2);outline:none;}
.finp:focus{border-color:var(--green);background:var(--bg);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ── Data table ── */
.dt{width:100%;border-collapse:collapse;font-size:12px;}
.dt th{font-size:11px;font-weight:700;color:var(--text2);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);}
.dt td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
.dt tr:last-child td{border-bottom:none;}
.dt tr:hover td{background:var(--bg2);}

/* ── 작품관리 편집 카드 ── */
.edit-row{border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;
  margin-bottom:6px;cursor:pointer;background:var(--bg);}
.edit-row:hover{background:var(--bg2);border-color:var(--border2);}
.edit-preview{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.5;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
</style>
</head>
<body>

<!-- ══ START ══ -->
<div class="screen on" id="sc-start">
  <div class="start-inner">
    <p class="kma-label">KMA</p>
    <h1 class="start-title">영미문화연구</h1>
    <p class="start-sub">Anglo-American Cultural Studies · 2학년</p>
    <input class="start-input" id="start-name" type="text"
           placeholder="생도 이름을 입력하세요" maxlength="20"
           onkeydown="if(event.key==='Enter')startApp()">
    <button class="start-btn" onclick="startApp()">시작하기</button>
    <p class="start-note">생도 이름은 교수자 성적 관리에 자동으로 등록됩니다.</p>
    <button class="start-prof" onclick="openProf()">교수자 모드 🔑</button>
  </div>
</div>

<!-- ══ APP ══ -->
<div class="screen" id="sc-app">
  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-kma">KMA</span>
      <span class="topbar-sep">|</span>
      <span class="topbar-title">영미문화연구</span>
    </div>
    <div class="topbar-right">
      <span class="cpill" id="cpill"></span>
      <span class="ppill" id="ppill">0%</span>
      <button class="icon-btn" onclick="openProf()" title="교수자 모드">
        <i class="ti ti-lock"></i>
      </button>
    </div>
  </header>
  <nav class="wtabs" id="wtabs"></nav>
  <div class="stepper" id="stepper">
    <div class="si active" id="st0" onclick="goStage(0)">
      <div class="sdot" id="sd0">1</div><span class="slbl">단어장</span>
    </div>
    <div class="sline"></div>
    <div class="si" id="st1" onclick="goStage(1)">
      <div class="sdot" id="sd1">2</div><span class="slbl">핵심 단락</span>
    </div>
    <div class="sline"></div>
    <div class="si" id="st2" onclick="goStage(2)">
      <div class="sdot" id="sd2">3</div><span class="slbl">질문 &amp; 답변</span>
    </div>
  </div>
  <main class="content" id="content"></main>
</div>

<!-- ══ PROF OVERLAY ══ -->
<div class="overlay" id="ov-prof">
  <div class="modal-box">
    <div class="mhdr">
      <span class="mttl">교수자 모드</span>
      <button class="btn btn-sm btn-ghost" onclick="closeOv('ov-prof')">닫기</button>
    </div>
    <div id="prof-login">
      <p style="font-size:13px;color:var(--text2);margin-bottom:8px;">비밀번호를 입력하세요</p>
      <input class="finp" type="password" id="pw-in" placeholder="비밀번호"
             onkeydown="if(event.key==='Enter')profLogin()" style="margin-bottom:8px;">
      <div class="flex gap8 mt8">
        <button class="btn btn-p btn-sm" onclick="profLogin()">로그인</button>
        <button class="btn btn-sm" onclick="closeOv('ov-prof')">취소</button>
      </div>
      <p class="hint mt8">기본 비밀번호: kma2025</p>
      <p id="pw-err" style="font-size:12px;color:var(--red);display:none;margin-top:4px;">비밀번호가 올바르지 않습니다</p>
    </div>
    <div id="prof-panel" style="display:none;">
      <div class="ptabs">
        <button class="ptab active" onclick="pt(0,this)">생도 성적</button>
        <button class="ptab" onclick="pt(1,this)">작품 관리</button>
        <button class="ptab" onclick="pt(2,this)">새 작품 추가</button>
        <button class="ptab" onclick="pt(3,this)">설정</button>
      </div>
      <div id="pp0"></div>
      <div id="pp1" style="display:none;"></div>
      <div id="pp2" style="display:none;"></div>
      <div id="pp3" style="display:none;"></div>
    </div>
  </div>
</div>

<!-- ══ 생도 답변 보기 OVERLAY ══ -->
<div class="overlay" id="ov-ans">
  <div class="modal-box">
    <div class="mhdr">
      <div>
        <div id="am-meta" class="hint mb8"></div>
        <div id="am-q" style="font-size:14px;font-weight:600;line-height:1.6;"></div>
      </div>
      <button class="btn btn-sm" onclick="closeOv('ov-ans')" style="flex-shrink:0;margin-left:12px;">닫기</button>
    </div>
    <p style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin:12px 0 6px;">생도 답변</p>
    <div id="am-ans" style="font-size:13px;line-height:1.8;white-space:pre-wrap;"></div>
    <div class="fb on" id="am-fb" style="margin-top:12px;">
      <div class="fb-lbl">AI 피드백</div>
      <div class="fb-text" id="am-fb-text"></div>
    </div>
  </div>
</div>

<!-- ══ 편집 OVERLAY ══ -->
<div class="overlay" id="ov-edit">
  <div class="modal-box">
    <div class="mhdr">
      <span class="mttl" id="edit-title">수정</span>
      <button class="btn btn-sm btn-ghost" onclick="closeOv('ov-edit')">닫기</button>
    </div>
    <div id="edit-body"></div>
    <div class="flex gap8 mt12">
      <button class="btn btn-p btn-sm" id="edit-save-btn">저장</button>
      <button class="btn btn-sm" onclick="closeOv('ov-edit')">취소</button>
    </div>
  </div>
</div>

<script>
/* ══ OVERLAY HELPERS ══ */
function openOv(id){ document.getElementById(id).classList.add('on'); }
function closeOv(id){ document.getElementById(id).classList.remove('on'); }

/* ══ STORAGE ══ */
const SK={works:'kma_c_works_v4',ans:'kma_c_ans_v4',cadets:'kma_c_cadets_v4',pw:'kma_c_pw_v4'};
const ls={
  get:k=>{try{return localStorage.getItem(k);}catch(e){return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,v);}catch(e){}}
};

/* ══ DEFAULT DATA ══ */
const DEFAULT=[{
  id:'phaeton',titleKo:'파에톤',titleEn:'Phaeton',
  author:'Thomas Bulfinch',year:'1855',source:"Bulfinch's Mythology",week:'3주차',
  vocab:[
    {word:'Phaeton',    pos:'n.',  def:'파에톤 — 이 신화의 주인공. 태양신 아폴로의 아들로, 태양 전차를 몰겠다는 무모한 열망으로 결국 비극적 최후를 맞이한다.'},
    {word:'Apollo',     pos:'n.',  def:'아폴로(Phoebus) — 태양신. 파에톤의 아버지로, 스틱스 강에 맹세한 약속을 지키기 위해 결국 아들에게 전차를 내준다.'},
    {word:'Clymene',    pos:'n.',  def:'클리메네 — 파에톤의 어머니이자 님프. 아폴로와의 관계를 아들에게 밝히고 인도(India)로 가볼 것을 권한다.'},
    {word:'Jupiter',    pos:'n.',  def:'유피테르 — 신들의 왕. 세계가 파에톤의 실수로 불타자 번개로 그를 쳐 전차에서 떨어뜨린다.'},
    {word:'Vulcan',     pos:'n.',  def:'불카누스 — 불과 대장간의 신. 태양궁의 벽화와 황금 전차를 만든 신적 장인.'},
    {word:'Tethys',     pos:'n.',  def:'테티스 — 서쪽 바다의 여신. 매일 저녁 태양 전차가 도달하는 종착지의 수호신.'},
    {word:'Eridanus',   pos:'n.',  def:'에리다누스 — 이탈리아의 강(현재의 포강). 추락한 파에톤의 불타는 몸을 식혀준 강.'},
    {word:'Heliades',   pos:'n.',  def:'헬리아데스 — 파에톤의 누이들. 오빠의 죽음을 슬퍼하다 포플러 나무로 변했고, 그들의 눈물은 호박(amber)이 되었다.'},

/* ══ STATE ══ */
let works=[],ans={},cadets={},cadet='',curW=0,curS=0,profPW='kma2025',profIn=false;
let editCtx={};

/* ══ LOAD / SAVE ══ */
function loadData(){
  try{const r=ls.get(SK.works);works=r?JSON.parse(r):DEFAULT;}catch(e){works=DEFAULT;}
  try{const r=ls.get(SK.ans);  ans=r?JSON.parse(r):{};}catch(e){ans={};}
  try{const r=ls.get(SK.cadets);cadets=r?JSON.parse(r):{};}catch(e){cadets={};}
  try{const r=ls.get(SK.pw);   if(r)profPW=r;}catch(e){}
}
function save(){
  ls.set(SK.works,JSON.stringify(works));
  ls.set(SK.ans,  JSON.stringify(ans));
  ls.set(SK.cadets,JSON.stringify(cadets));
}

/* ══ START ══ */
function startApp(){
  const n=document.getElementById('start-name').value.trim();
  if(!n){alert('이름을 입력해주세요.');return;}
  cadet=n;
  if(!cadets[n]) cadets[n]={joinedAt:new Date().toLocaleString('ko-KR')};
  save();
  document.getElementById('cpill').textContent=n+' 생도';
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById('sc-app').classList.add('on');
  curW=0;curS=0;
  renderAll();
}

/* ══ TABS ══ */
function renderTabs(){
  document.getElementById('wtabs').innerHTML=works.map((w,i)=>
    `<button class="wtab${i===curW?' active':''}" onclick="selW(${i})">${w.week} · ${w.titleKo}</button>`
  ).join('');
}
function selW(i){curW=i;curS=0;renderAll();}

/* ══ STEPPER ══ */
function stageDone(s){
  const w=works[curW];if(!w)return false;
  if(s===0)return Object.keys(ans).filter(k=>k.startsWith(`${w.id}_v_`)).length>=Math.ceil(w.vocab.length*0.5);
  if(s===1)return !!ans[`${w.id}_read`];
  if(s===2)return w.questions.every((_,i)=>ans[`${w.id}_q_${i}`]);
}
function renderStepper(){
  [0,1,2].forEach(i=>{
    const el=document.getElementById(`st${i}`),dot=document.getElementById(`sd${i}`);
    const done=stageDone(i);
    el.className='si'+(i===curS?' active':done?' done':'');
    dot.innerHTML=done?'<i class="ti ti-check" style="font-size:12px;"></i>':(i+1);
  });
}
function goStage(s){curS=s;renderStepper();renderContent();}

/* ══ PROGRESS ══ */
function renderProg(){
  const w=works[curW];if(!w){document.getElementById('ppill').textContent='0%';return;}
  const vD=Object.keys(ans).filter(k=>k.startsWith(`${w.id}_v_`)).length;
  const rD=ans[`${w.id}_read`]?1:0;
  const qD=w.questions.filter((_,i)=>ans[`${w.id}_q_${i}`]).length;
  const tot=w.vocab.length+1+w.questions.length;
  document.getElementById('ppill').textContent=Math.round((vD+rD+qD)/tot*100)+'%';
}

function renderAll(){renderTabs();renderStepper();renderProg();renderContent();}

/* ══ CONTENT ══ */
function renderContent(){
  const w=works[curW],el=document.getElementById('content');
  if(!w){el.innerHTML='<div class="empty"><i class="ti ti-books"></i>등록된 작품이 없습니다.<br>교수자 모드에서 추가해주세요.</div>';return;}
  if(curS===0)el.innerHTML=buildVocab(w);
  else if(curS===1)el.innerHTML=buildPassages(w);
  else el.innerHTML=buildQA(w);
}

/* ── Stage 1: Vocab ── */
function buildVocab(w){
  const rev=Object.keys(ans).filter(k=>k.startsWith(`${w.id}_v_`)).length;
  const pct=Math.round(rev/w.vocab.length*100);
  const half=Math.ceil(w.vocab.length*0.5);
  const cards=w.vocab.map((v,i)=>{
    const r=!!ans[`${w.id}_v_${i}`];
    return `<div class="vc${r?' rev':''}" onclick="revV('${w.id}',${i})">
      <div class="vc-word">${v.word}</div>
      <div class="vc-pos">${v.pos}</div>
      <div class="vc-hint">${r?'✓ 확인됨':'탭하여 확인'}</div>
      <div class="vc-def">${v.def}</div>
    </div>`;
  }).join('');
  return `
  <div class="flex jb ai mb12" style="flex-wrap:wrap;gap:8px;">
    <div>
      <p style="font-size:15px;font-weight:700;">${w.titleEn} · 단어장</p>
      <p class="hint mt4">${w.author} · <em>${w.source}</em> (${w.year})</p>
    </div>
    <span class="badge b-gray">${rev} / ${w.vocab.length} 확인</span>
  </div>
  <div class="pbar"><div class="pbar-f" style="width:${pct}%"></div></div>
  <p class="hint mb12">카드를 클릭해 뜻을 확인하세요.</p>
  <div class="vgrid">${cards}</div>
  <div class="step-nav">
    <p class="hint">${rev>=half?'✓ 절반 이상 확인 완료':`${half-rev}개 더 확인하면 다음 단계 이동 권장`}</p>
    <button class="btn btn-p btn-sm" onclick="goStage(1)">핵심 단락 읽기 →</button>
  </div>`;
}
function revV(wid,i){ans[`${wid}_v_${i}`]=true;save();renderContent();renderStepper();renderProg();}

/* ── Stage 2: Passages ── */
function buildPassages(w){
  const html=w.passages.map((p,i)=>`
  <div class="card">
    <span class="badge b-purple" style="margin-bottom:10px;display:inline-block;">단락 ${i+1} · ${p.label}</span>
    <div class="p-en">${p.en}</div>
    <div class="p-ko">${p.ko}</div>
    <div class="p-note"><div class="p-note-lbl">교수자 해설</div>${p.note}</div>
  </div>`).join('');
  return `
  <div class="mb12">
    <p style="font-size:15px;font-weight:700;margin-bottom:4px;">${w.titleEn} · 핵심 단락</p>
    <p class="hint">교수자가 선정한 5개 핵심 단락입니다. 전체 텍스트는 수업 페이퍼를 참고하세요.</p>
  </div>
  ${html}
  <div class="step-nav">
    <button class="btn btn-sm" onclick="goStage(0)">← 단어장</button>
    <button class="btn btn-g btn-sm" onclick="markRead('${w.id}')">읽기 완료 · 질문으로 →</button>
  </div>`;
}
function markRead(wid){ans[`${wid}_read`]=true;save();renderStepper();renderProg();goStage(2);}

/* ── Stage 3: Q&A ── */
function buildQA(w){
  const qD=w.questions.filter((_,i)=>ans[`${w.id}_q_${i}`]).length;
  const qHtml=w.questions.map((q,qi)=>{
    const k=`${w.id}_q_${qi}`;
    const sv=typeof ans[k]==='object'?ans[k]:null;
    const cls=q.type==='theme'?'q-theme':q.type==='deep'?'q-deep':'q-basic';
    const badge=q.type==='theme'?'b-amber':q.type==='deep'?'b-purple':'b-green';
    const tag=q.type==='deep'
      ?`<span style="font-size:11px;color:var(--purple);"><i class="ti ti-book-upload" style="font-size:13px;vertical-align:-1px;"></i> 수업 페이퍼 전문 필요</span>`
      :q.type==='theme'
      ?`<span style="font-size:11px;color:var(--amber);"><i class="ti ti-flame" style="font-size:13px;vertical-align:-1px;"></i> 정답 없는 주제 토론</span>`:'';
    return `<div class="qblock ${cls}">
      <div class="flex gap6 ai mb8" style="flex-wrap:wrap;">
        <span class="badge ${badge}">${q.label}</span>${tag}
      </div>
      <div class="q-text">${q.q}</div>
      <div class="inset hint"><i class="ti ti-bulb" style="font-size:13px;vertical-align:-1px;margin-right:4px;"></i>${q.hint}</div>
      <textarea id="ta-${qi}" placeholder="영어 또는 한국어로 답하세요...">${sv?sv.answer:''}</textarea>
      <div class="flex gap8 mt8" style="flex-wrap:wrap;">
        <button class="btn btn-p btn-sm" onclick="submitAns('${w.id}',${qi})">저장 &amp; AI 피드백 ↗</button>

      </div>

async function submitAns(wid,qi){
  const w=works.find(x=>x.id===wid),q=w.questions[qi];
  const answer=document.getElementById(`ta-${qi}`).value.trim();
  if(!answer){alert('답변을 먼저 작성해주세요.');return;}
  document.getElementById(`sp-${qi}`).classList.add('on');
  document.getElementById(`fb-${qi}`).classList.remove('on');
  const sys=`You are an Anglo-American Cultural Studies professor at the Korean Military Academy teaching 2nd-year cadets. Give feedback in Korean. Structure with three labeled parts: (1) 잘 된 점 (2) 더 발전시킬 부분 (3) 생각해볼 추가 질문. Under 180 words total.`;
  const user=`Question type: ${q.type}\nQuestion: ${q.q}\nAnswer:\n${answer}`;
  let fb='';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:sys,messages:[{role:'user',content:user}]})});
    const d=await r.json();fb=d.content.map(c=>c.text||'').join('');
  }catch(e){fb='피드백 생성 중 오류가 발생했습니다.';}
  const rec={answer,feedback:fb,cadet,savedAt:new Date().toLocaleString('ko-KR')};
  ans[`${wid}_q_${qi}`]=rec;
  if(!cadets[cadet])cadets[cadet]={joinedAt:new Date().toLocaleString('ko-KR')};
  cadets[cadet][`${wid}_q_${qi}`]=rec;
  save();
  document.getElementById(`sp-${qi}`).classList.remove('on');
  document.getElementById(`fb-${qi}`).querySelector('.fb-text').innerHTML=fb.replace(/\n/g,'<br>');
  document.getElementById(`fb-${qi}`).classList.add('on');
  renderStepper();renderProg();
}

function exportCSV(){
  const wi=parseInt(document.getElementById('pw-sel')?.value||0),ws=works[wi];if(!ws)return;
  const qHdr=ws.questions.map((_,i)=>`Q${i+1}`);
  const header=['이름','단어장','단락읽기',...qHdr,'등록일'];
  const rows=Object.keys(cadets).map(name=>{
    const vD=Object.keys(ans).filter(k=>k.startsWith(`${ws.id}_v_`)&&ans[k]).length;
    const rD=ans[`${ws.id}_read`]?'완료':'-';
    const qs=ws.questions.map((_,i)=>cadets[name]?.[`${ws.id}_q_${i}`]?'제출':'-');
    return [name,vD,rD,...qs,cadets[name]?.joinedAt||''];
  });
  const csv=[header,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`영미문화연구_성적_${ws.titleKo}.csv`;a.click();
}

  let data=null;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4000,messages:[{role:'user',content:prompt}]})});
    const d=await r.json();
    const raw=d.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    data=JSON.parse(raw);
  }catch(e){
    document.getElementById('g-spin').classList.remove('on');
    document.getElementById('g-res-txt').textContent='생성 중 오류가 발생했습니다. 다시 시도해주세요.';
    document.getElementById('g-res').classList.add('on');return;
  }
  const id=ten.toLowerCase().replace(/[^a-z0-9]+/g,'_')+'_'+Date.now();
  works.push({id,titleKo:tko,titleEn:ten,author:au,year:'',source:src,week:wk,
    vocab:data.vocab,passages:data.passages,questions:data.questions});
  save();
  document.getElementById('g-spin').classList.remove('on');
  document.getElementById('g-res-txt').textContent=`✓ "${tko}" 저장 완료 — 단어 ${data.vocab.length}개 · 단락 ${data.passages.length}개 · 질문 ${data.questions.length}개`;
  document.getElementById('g-res').classList.add('on');
  renderTabs();renderPWorks();
}
function clearGen(){
  ['g-tko','g-ten','g-au','g-wk','g-src','g-txt'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  document.getElementById('g-res').classList.remove('on');
}

/* ── Prof: Settings ── */
function renderPSettings(){
  document.getElementById('pp3').innerHTML=`
  <p style="font-size:13px;font-weight:700;margin-bottom:10px;">비밀번호 변경</p>
  <input class="finp" type="password" id="new-pw" placeholder="새 비밀번호" style="margin-bottom:8px;">
  <button class="btn btn-p btn-sm" onclick="changePW()">변경</button>
  <p id="pw-ok" style="font-size:12px;color:var(--green-m);margin-top:6px;display:none;">✓ 변경되었습니다.</p>
  <div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);">
    <p style="font-size:13px;font-weight:700;margin-bottom:8px;">데이터 관리</p>
    <button class="btn btn-sm btn-danger" onclick="resetData()">모든 생도 데이터 초기화</button>
    <p class="hint mt8">주의: 모든 생도 답변과 진도 기록이 삭제됩니다.</p>
  </div>`;
}
function changePW(){
  const v=document.getElementById('new-pw').value.trim();
  if(!v){alert('비밀번호를 입력하세요.');return;}
  profPW=v;ls.set(SK.pw,v);
  document.getElementById('pw-ok').style.display='block';
}
function resetData(){
  if(!confirm('모든 생도 데이터를 초기화하시겠습니까?'))return;
  ans={};cadets={};save();alert('초기화 완료.');renderPCadets();
}

/* ══ INIT ══ */
loadData();
